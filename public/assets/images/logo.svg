<svg xmlns="http://www.w3.org/2000/svg" width="780" height="180" viewBox="0 0 780 180" role="img" aria-label="LifecyclePilot logo">
    <title>LifecyclePilot</title>

    <defs>
        <style>
            .g { fill: #111827; }
            .y { fill: #EAB308; }
            .word { font: 700 66px/1.1 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; }
            .tag  { font: 500 24px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; letter-spacing: .02em; }
        </style>
    </defs>

    <!-- Wordmark -->
    <text x="192" y="93" class="word g">Lifecycle<tspan class="y">Pilot</tspan></text>
